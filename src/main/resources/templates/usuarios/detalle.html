<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Usuario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        nav { background: #333; padding: 12px 24px; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin-right: 16px; font-size: 14px; }
        .container { max-width: 650px; margin: 32px auto; padding: 0 20px; }
        .card { background: white; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { color: #333; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f0f0f0; color: #333; padding: 10px 14px; text-align: left; width: 160px; font-size: 14px; border-bottom: 1px solid #eee; }
        td { padding: 10px 14px; font-size: 14px; border-bottom: 1px solid #eee; }
        .btn { display: inline-block; padding: 8px 18px; background: #333; color: white; text-decoration: none; border-radius: 4px; font-size: 13px; margin-top: 20px; margin-right: 8px; }
        .btn-warning { background: #e68a00; }
        .logout-btn { background: none; border: 1px solid white; color: white; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
<nav>
    <div>
        <a th:href="@{/}"> Inicio</a>
        <a th:href="@{/usuarios}"> Usuarios</a>
    </div>
    <div>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="logout-btn">Cerrar sesion</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="card">
        <h1> Detalle de Usuario</h1>
        <table>
            <tr>
                <th>Cedula</th>
                <td th:text="${usuario.cedula}"></td>
            </tr>
            <tr>
                <th>Nombre</th>
                <td th:text="${usuario.nombre}"></td>
            </tr>
            <tr>
                <th>Email</th>
                <td th:text="${usuario.email}"></td>
            </tr>
            <tr>
                <th>Clave</th>
                <td><em style="color:#888">*** (encriptada)</em></td>
            </tr>
        </table>
        <div>
            <a th:href="@{/usuarios/editar/{cedula}(cedula=${usuario.cedula})}"
               class="btn btn-warning"> Editar</a>
            <a th:href="@{/usuarios}" class="btn">← Volver al listado</a>
        </div>
    </div>
</div>
</body>
</html>
