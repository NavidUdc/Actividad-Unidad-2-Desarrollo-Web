<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EJEMPLO DE APP WEB MVC CON SPRING BOOT</title>
    <meta charset="UTF-8"/>
      <style>
        /* ===== ESTILOS MEJORADOS PARA HEADER Y FOOTER ===== */
        
        /* Header Styles */
        header {
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            color: white;
            padding: 30px 0;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer Styles */
        footer {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        footer span {
            display: block;
            font-size: 1rem;
            margin-bottom: 15px;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        footer p {
            margin: 15px 0 0 0;
        }

        /* Botón de YouTube con color rojo característico */
        footer a {
            color: white;
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
        }

        footer a:hover {
            background: linear-gradient(135deg, #ff3333 0%, #e60000 100%);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255,0,0,0.5);
        }

        /* Icono de YouTube más grande */
        footer a::before {
            content: "📺";
            font-size: 1.3rem;
        
        }
    </style>
</head>
<body>

<!-- Guia 14: fragmento cabecero — Guia 15: usa #{} para leer messages.properties -->
<header th:fragment="cabecero">
    <h1 th:text="#{plantilla.titulo}">El titulo</h1>
</header>

<!-- Guia 14: fragmento pie — Guia 15: usa #{} para leer messages.properties -->
<footer th:fragment="pie">
    <span th:text="#{plantilla.pie}">El Pie</span>
    <p><a href="https://youtube.com/@navidjoselobatosaez8251?si=pRHRnlWMLGusuwVG">
        Canal de Youtube
    </a></p>
</footer>

</body>
</html>
