# Conexion a MySQL de Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/crud_usuarios_mvc?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Puerto del servidor
server.port=9092

# Thymeleaf
spring.thymeleaf.cache=false

# Guia 15: archivo de mensajes internacionalizados
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Configuracion de correo con MailHog (desarrollo local)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false